<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIOMA Chamber</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300&family=Noto+Sans+Malayalam&display=swap" rel="stylesheet">

<style>

/* ================= BODY ================= */

body{
margin:0;
height:100vh;
overflow:hidden;
background:radial-gradient(circle,#090a1f,#000);
color:white;
font-family:'Poppins',sans-serif;
}

/* ================= STAR FIELD ================= */

.stars{
position:absolute;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:moveStars 180s linear infinite;
opacity:.7;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:4000px 4000px;}
}

/* ================= FLOATING LIGHT ================= */

.light{
position:absolute;
width:500px;
height:500px;
border-radius:50%;
background:radial-gradient(circle,
rgba(201,160,255,0.25),
transparent 70%);
animation:lightMove 12s infinite alternate ease-in-out;
}

@keyframes lightMove{
from{transform:translate(10%,20%);}
to{transform:translate(60%,40%);}
}

/* ================= CHAMBER ================= */

.chamber{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
animation:fadeIn 3s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translate(-50%,-40%);
}
to{
opacity:1;
transform:translate(-50%,-50%);
}
}

/* ================= TITLE ================= */

.moonTitle{
font-size:42px;
letter-spacing:3px;
animation:glow 4s infinite ease-in-out;
}

@keyframes glow{
0%,100%{text-shadow:0 0 10px #c9a0ff;}
50%{text-shadow:0 0 30px #ffffff;}
}

.malayalam{
font-family:'Noto Sans Malayalam';
opacity:.85;
margin-top:10px;
}

/* ================= POEM ================= */

.poem{
margin-top:50px;
max-width:650px;
line-height:2;
font-size:18px;
opacity:0;
animation:poemReveal 6s forwards;
animation-delay:2s;
}

@keyframes poemReveal{
0%{
opacity:0;
transform:translateY(40px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

/* ================= FLOAT PARTICLES ================= */

.particle{
position:absolute;
width:4px;
height:4px;
background:white;
border-radius:50%;
opacity:.6;
animation:floatUp linear infinite;
}

@keyframes floatUp{
from{
transform:translateY(100vh);
opacity:0;
}
to{
transform:translateY(-10vh);
opacity:1;
}
}

/* ================= BACK BUTTON ================= */

.back{
position:absolute;
top:25px;
left:25px;
cursor:pointer;
opacity:.7;
transition:.3s;
}

.back:hover{
opacity:1;
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="light"></div>

<div class="back" onclick="goBack()">← Galaxy</div>

<div class="chamber">

<h1 id="moonName" class="moonTitle"></h1>

<p class="malayalam">
നിങ്ങൾ ഒരു ചന്ദ്രന്റെ ആത്മാവിലേക്ക് പ്രവേശിച്ചു
</p>

<div id="poemText" class="poem"></div>

</div>

<script>

/* ================= CREATE PARTICLES ================= */

for(let i=0;i<40;i++){
let star=document.createElement("div");
star.className="particle";
star.style.left=Math.random()*100+"vw";
star.style.animationDuration=(6+Math.random()*8)+"s";
document.body.appendChild(star);
}

/* ================= MOON DATA ================= */

const params=new URLSearchParams(window.location.search);
const moon=params.get("moon");

const data={

dream:{
title:"Dream Moon 🌙",
poem:`Dreams drift quietly
between reality and night,
waiting for someone
brave enough to believe.`
},

hope:{
title:"Hope Moon 🌕",
poem:`Hope is light
that refuses to disappear,
even when darkness stays longer.`
},

silent:{
title:"Silent Moon 🌘",
poem:`In silence,
the universe whispers truths
only calm hearts hear.`
},

memory:{
title:"Memory Moon 🌒",
poem:`Memories glow softly,
like moonlight resting
on forgotten oceans.`
}

};

document.getElementById("moonName").innerText =
data[moon].title;

document.getElementById("poemText").innerText =
data[moon].poem;

/* ================= BACK ================= */

function goBack(){
window.location.href="moon.html";
}

</script>
<script src="music.js"></script>
</body>
</html>

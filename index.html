<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIOMA</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Poppins:wght@300&family=Noto+Sans+Malayalam&display=swap" rel="stylesheet">

<style>

/* ================= BODY ================= */

body{
margin:0;
height:100vh;
overflow:hidden;
background:radial-gradient(circle at top,#111430,#000);
color:white;
font-family:'Poppins',sans-serif;
}

/* ================= STARS ================= */

.stars{
position:absolute;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:starMove 120s linear infinite;
}

@keyframes starMove{
from{background-position:0 0;}
to{background-position:2000px 2000px;}
}

/* ================= CENTER ================= */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
transition:1s;
}

.title{
font-family:'Cinzel',serif;
font-size:70px;
letter-spacing:6px;
}

.subtitle{
opacity:.8;
margin-top:10px;
}

.malayalam{
font-family:'Noto Sans Malayalam',sans-serif;
margin-top:8px;
opacity:.85;
}

/* ================= MOON ================= */

.moon{
width:230px;
height:230px;
margin:40px auto;
border-radius:50%;
cursor:pointer;
transition:2s ease;

background:
radial-gradient(circle at 30% 30%,
#fff,
#e6e6fa 40%,
#bfa6ff 70%,
#8a6cff);

box-shadow:
0 0 60px #c9a0ff,
0 0 120px #9f7bff,
0 0 200px #6e54ff;

animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-20px);}
}

/* ===== MOON ZOOM ===== */

.moon.expand{
transform:scale(25);
box-shadow:
0 0 400px white,
0 0 900px #c9a0ff;
}

/* ================= BUTTON ================= */

.enter-btn{
padding:14px 35px;
background:transparent;
border:1px solid #c9a0ff;
color:white;
cursor:pointer;
letter-spacing:2px;
transition:.4s;
}

.enter-btn:hover{
background:#c9a0ff;
}

/* ================= FADE ================= */

.fade{
opacity:0;
transition:1s;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="container" id="content">

<h1 class="title">NIOMA</h1>

<p class="subtitle">
Every Moon Holds a Memory
</p>

<p class="malayalam">
ഓരോ ചന്ദ്രനും ഒരു ഓർമ്മ സൂക്ഷിക്കുന്നു
</p>

<div class="moon" id="moon"></div>

<button onclick="startMusic(); enterMoon();">
Enter / പ്രവേശിക്കുക
</button>

</div>

<script>
let music;

function startMusic(){
    music = new Audio("assets/moon.mp3");
    music.loop = true;
    music.play();
}
function enterMoon(){

const moon=document.getElementById("moon");
const content=document.getElementById("content");

content.classList.add("fade");
moon.classList.add("expand");

setTimeout(()=>{
window.location.href="moon.html";
},2000);

}

</script>

<script src="music.js"></script>

</body>
</html>
